<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#030711"/><stop offset="0.42" stop-color="#07111f"/><stop offset="1" stop-color="#02040a"/></linearGradient>
  <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#3B82F6" stop-opacity="0.55"/><stop offset="1" stop-color="#3B82F6" stop-opacity="0"/></radialGradient>
  <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#22D3EE" stop-opacity="0.40"/><stop offset="1" stop-color="#22D3EE" stop-opacity="0"/></radialGradient>
  <radialGradient id="violetGlow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#A855F7" stop-opacity="0.40"/><stop offset="1" stop-color="#A855F7" stop-opacity="0"/></radialGradient>
  <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#111827" stop-opacity="0.98"/><stop offset="1" stop-color="#070B12" stop-opacity="0.98"/></linearGradient>
  <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0F172A"/><stop offset="1" stop-color="#050914"/></linearGradient>
  <linearGradient id="blueStroke" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#60A5FA"/><stop offset="0.5" stop-color="#22D3EE"/><stop offset="1" stop-color="#818CF8"/></linearGradient>
  <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.55"/></filter>
  <filter id="glowBlue" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#94A3B8" stroke-opacity="0.055" stroke-width="1"/></pattern>
  <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#60A5FA"/></marker>
  <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#86EFAC"/></marker>
  <style>
    .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:-1.2px;fill:#F8FAFC}
    .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#94A3B8}
    .label{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:700;fill:#E2E8F0}
    .small{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#CBD5E1}
    .micro{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#94A3B8}
    .mono{font-family:JetBrains Mono,Consolas,monospace;font-weight:600;fill:#A7F3D0}
  </style>
</defs>
<rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)"/><circle cx="1260" cy="160" r="280" fill="url(#blueGlow)"/><circle cx="350" cy="760" r="330" fill="url(#violetGlow)"/><circle cx="840" cy="450" r="420" fill="url(#cyanGlow)" opacity="0.36"/>
<text x="800" y="64" text-anchor="middle" class="title" font-size="42">TotalReClaw Workflow</text><text x="800" y="98" text-anchor="middle" class="sub" font-size="18">Recall → capture → review → accept → improve future sessions</text><g filter="url(#softShadow)"><rect x="80" y="250" width="220" height="230" rx="24" fill="url(#card)" stroke="#A78BFA" stroke-opacity="0.78"/><line x1="104" y1="334" x2="276" y2="334" stroke="#A78BFA" stroke-opacity="0.28"/><g transform="translate(104,272)" fill="none" stroke="#A78BFA" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="10"/><path d="M26 26l10 10"/></g><text x="158" y="293" class="label" font-size="18">1. CHECK</text><text x="104" y="362" class="small" font-size="15">Operator asks for recall before risky work</text><circle cx="114" cy="393" r="4" fill="#A78BFA"/><text x="128" y="398" class="micro" font-size="13">prior fixes</text><circle cx="114" cy="420" r="4" fill="#A78BFA"/><text x="128" y="425" class="micro" font-size="13">decisions</text><circle cx="114" cy="447" r="4" fill="#A78BFA"/><text x="128" y="452" class="micro" font-size="13">known blockers</text></g><g filter="url(#softShadow)"><rect x="370" y="250" width="230" height="230" rx="24" fill="url(#card)" stroke="#60A5FA" stroke-opacity="0.78"/><line x1="394" y1="334" x2="576" y2="334" stroke="#60A5FA" stroke-opacity="0.28"/><g transform="translate(394,272)" fill="none" stroke="#60A5FA" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="8" width="32" height="26" rx="4"/><path d="M12 17l6 5-6 5M22 28h9"/></g><text x="448" y="293" class="label" font-size="18">2. RECALL</text><text x="394" y="362" class="small" font-size="15">Hook searches accepted memory with limits</text><circle cx="404" cy="393" r="4" fill="#60A5FA"/><text x="418" y="398" class="micro" font-size="13">bounded query</text><circle cx="404" cy="420" r="4" fill="#60A5FA"/><text x="418" y="425" class="micro" font-size="13">fail open</text><circle cx="404" cy="447" r="4" fill="#60A5FA"/><text x="418" y="452" class="micro" font-size="13">reference cards</text></g><g filter="url(#softShadow)"><rect x="670" y="250" width="230" height="230" rx="24" fill="url(#card)" stroke="#22D3EE" stroke-opacity="0.78"/><line x1="694" y1="334" x2="876" y2="334" stroke="#22D3EE" stroke-opacity="0.28"/><g transform="translate(694,272)" fill="none" stroke="#22D3EE" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="7" width="12" height="12" rx="2"/><rect x="25" y="7" width="12" height="12" rx="2"/><rect x="15" y="27" width="12" height="12" rx="2"/><path d="M17 13h8M21 27V19M30 19l-5 8"/></g><text x="748" y="293" class="label" font-size="18">3. ACT</text><text x="694" y="362" class="small" font-size="15">Agent uses visible context, not hidden writes</text><circle cx="704" cy="393" r="4" fill="#22D3EE"/><text x="718" y="398" class="micro" font-size="13">safer commands</text><circle cx="704" cy="420" r="4" fill="#22D3EE"/><text x="718" y="425" class="micro" font-size="13">less repetition</text><circle cx="704" cy="447" r="4" fill="#22D3EE"/><text x="718" y="452" class="micro" font-size="13">explainable path</text></g><g filter="url(#softShadow)"><rect x="980" y="250" width="230" height="230" rx="24" fill="url(#card)" stroke="#FBBF24" stroke-opacity="0.78"/><line x1="1004" y1="334" x2="1186" y2="334" stroke="#FBBF24" stroke-opacity="0.28"/><g transform="translate(1004,272)" fill="none" stroke="#FBBF24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4l4 13 13 4-13 4-4 13-4-13-13-4 13-4 4-13Z"/></g><text x="1058" y="293" class="label" font-size="18">4. CAPTURE</text><text x="1004" y="362" class="small" font-size="15">Session artifacts become drafts only</text><circle cx="1014" cy="393" r="4" fill="#FBBF24"/><text x="1028" y="398" class="micro" font-size="13">commands</text><circle cx="1014" cy="420" r="4" fill="#FBBF24"/><text x="1028" y="425" class="micro" font-size="13">files</text><circle cx="1014" cy="447" r="4" fill="#FBBF24"/><text x="1028" y="452" class="micro" font-size="13">summary</text></g><g filter="url(#softShadow)"><rect x="1290" y="250" width="230" height="230" rx="24" fill="url(#card)" stroke="#86EFAC" stroke-opacity="0.78"/><line x1="1314" y1="334" x2="1496" y2="334" stroke="#86EFAC" stroke-opacity="0.28"/><g transform="translate(1314,272)" fill="none" stroke="#86EFAC" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 5l14 6v10c0 9-6 15-14 18C13 36 7 30 7 21V11l14-6Z"/><path d="M14 22l5 5 10-12"/></g><text x="1368" y="293" class="label" font-size="18">5. APPROVE</text><text x="1314" y="362" class="small" font-size="15">Operator decides what becomes durable</text><circle cx="1324" cy="393" r="4" fill="#86EFAC"/><text x="1338" y="398" class="micro" font-size="13">accept</text><circle cx="1324" cy="420" r="4" fill="#86EFAC"/><text x="1338" y="425" class="micro" font-size="13">reject</text><circle cx="1324" cy="447" r="4" fill="#86EFAC"/><text x="1338" y="452" class="micro" font-size="13">resolve</text></g><path d="M300 365H370" stroke="#A78BFA" stroke-width="4" marker-end="url(#arrowBlue)" filter="url(#glowBlue)"/><path d="M600 365H670" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrowBlue)" filter="url(#glowBlue)"/><path d="M900 365H980" stroke="#22D3EE" stroke-width="4" marker-end="url(#arrowBlue)" filter="url(#glowBlue)"/><path d="M1210 365H1290" stroke="#FBBF24" stroke-width="4" marker-end="url(#arrowBlue)" filter="url(#glowBlue)"/><g filter="url(#softShadow)"><path d="M800 570L965 660L800 750L635 660Z" fill="#06130D" stroke="#86EFAC" stroke-width="3"/><text x="800" y="650" text-anchor="middle" class="title" font-size="24">Review Gate</text><text x="800" y="684" text-anchor="middle" class="micro" font-size="15">nothing is auto-accepted</text></g>
<path d="M1400 480 C1400 660 1040 660 965 660" stroke="#86EFAC" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrowGreen)" opacity="0.86"/>
<path d="M635 660 C450 660 190 650 190 480" stroke="#60A5FA" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrowBlue)" opacity="0.65"/>
<g transform="translate(450 790)"><rect width="700" height="58" rx="20" fill="#07111f" stroke="#1E40AF"/><text x="350" y="36" text-anchor="middle" class="small" font-size="16">Feedback loop: accepted memory improves future recall while rejected drafts disappear from durable memory.</text></g>
</svg>