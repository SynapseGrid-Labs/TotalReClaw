<text x="800" y="64" text-anchor="middle" class="title" font-size="42">TotalReClaw Architecture</text><text x="800" y="98" text-anchor="middle" class="sub" font-size="18">OpenClaw hooks · bounded recall · reviewed persistence</text><g filter="url(#softShadow)"><rect x="88" y="135" width="1424" height="94" rx="20" fill="url(#card)" stroke="#A78BFA" stroke-opacity="0.72"/><rect x="90" y="137" width="1420" height="90" rx="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.06"/><g transform="translate(120,161)" fill="none" stroke="#A78BFA" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="8" width="32" height="26" rx="4"/><path d="M12 17l6 5-6 5M22 28h9"/></g><text x="184" y="173" class="label" font-size="19">1. OPERATOR + OPENCLAW</text><text x="184" y="201" class="micro" font-size="14">Prompt input, commands, files, terminal context</text><rect x="570" y="157" width="190" height="50" rx="12" fill="#0B1220" stroke="#A78BFA" stroke-opacity="0.28"/><text x="665" y="188" text-anchor="middle" class="small" font-size="14">/totalreclaw check</text><rect x="785" y="157" width="190" height="50" rx="12" fill="#0B1220" stroke="#A78BFA" stroke-opacity="0.28"/><text x="880" y="188" text-anchor="middle" class="small" font-size="14">manual capture</text><rect x="1000" y="157" width="190" height="50" rx="12" fill="#0B1220" stroke="#A78BFA" stroke-opacity="0.28"/><text x="1095" y="188" text-anchor="middle" class="small" font-size="14">session close</text><rect x="1215" y="157" width="190" height="50" rx="12" fill="#0B1220" stroke="#A78BFA" stroke-opacity="0.28"/><text x="1310" y="188" text-anchor="middle" class="small" font-size="14">explain context</text></g><path d="M800 231V257" stroke="#A78BFA" stroke-width="3" marker-end="url(#arrowBlue)" opacity="0.75"/><g filter="url(#softShadow)"><rect x="88" y="251" width="1424" height="94" rx="20" fill="url(#card)" stroke="#60A5FA" stroke-opacity="0.72"/><rect x="90" y="253" width="1420" height="90" rx="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.06"/><g transform="translate(120,277)" fill="none" stroke="#60A5FA" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="10"/><path d="M26 26l10 10"/></g><text x="184" y="289" class="label" font-size="19">2. BEFORE-PROMPT RECALL</text><text x="184" y="317" class="micro" font-size="14">Bounded search before risky work; fail-open on errors</text><rect x="570" y="273" width="190" height="50" rx="12" fill="#0B1220" stroke="#60A5FA" stroke-opacity="0.28"/><text x="665" y="304" text-anchor="middle" class="small" font-size="14">query classifier</text><rect x="785" y="273" width="190" height="50" rx="12" fill="#0B1220" stroke="#60A5FA" stroke-opacity="0.28"/><text x="880" y="304" text-anchor="middle" class="small" font-size="14">recall limits</text><rect x="1000" y="273" width="190" height="50" rx="12" fill="#0B1220" stroke="#60A5FA" stroke-opacity="0.28"/><text x="1095" y="304" text-anchor="middle" class="small" font-size="14">prior fixes</text><rect x="1215" y="273" width="190" height="50" rx="12" fill="#0B1220" stroke="#60A5FA" stroke-opacity="0.28"/><text x="1310" y="304" text-anchor="middle" class="small" font-size="14">risk hints</text></g><path d="M800 347V373" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrowBlue)" opacity="0.75"/><g filter="url(#softShadow)"><rect x="88" y="367" width="1424" height="94" rx="20" fill="url(#card)" stroke="#22D3EE" stroke-opacity="0.72"/><rect x="90" y="369" width="1420" height="90" rx="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.06"/><g transform="translate(120,393)" fill="none" stroke="#22D3EE" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="7" width="12" height="12" rx="2"/><rect x="25" y="7" width="12" height="12" rx="2"/><rect x="15" y="27" width="12" height="12" rx="2"/><path d="M17 13h8M21 27V19M30 19l-5 8"/></g><text x="184" y="405" class="label" font-size="19">3. CONTEXT INJECTION</text><text x="1