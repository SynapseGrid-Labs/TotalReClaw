="14">conflict resolve</text></g><path d="M800 695V721" stroke="#F472B6" stroke-width="3" marker-end="url(#arrowBlue)" opacity="0.75"/><g filter="url(#softShadow)"><rect x="88" y="715" width="1424" height="94" rx="20" fill="url(#card)" stroke="#86EFAC" stroke-opacity="0.72"/><rect x="90" y="717" width="1420" height="90" rx="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.06"/><g transform="translate(120,741)" fill="none" stroke="#86EFAC" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="21" cy="12" rx="13" ry="6"/><path d="M8 12v18c0 3 6 6 13 6s13-3 13-6V12"/><path d="M8 21c0 3 6 6 13 6s13-3 13-6"/></g><text x="184" y="753" class="label" font-size="19">6. DURABLE MEMORY STORE</text><text x="184" y="781" class="micro" font-size="14">SQLite records + draft files remain inspectable and portable</text><rect x="570" y="737" width="190" height="50" rx="12" fill="#0B1220" stroke="#86EFAC" stroke-opacity="0.28"/><text x="665" y="768" text-anchor="middle" class="small" font-size="14">SQLite</text><rect x="785" y="737" width="190" height="50" rx="12" fill="#0B1220" stroke="#86EFAC" stroke-opacity="0.28"/><text x="880" y="768" text-anchor="middle" class="small" font-size="14">draft JSON</text><rect x="1000" y="737" width="190" height="50" rx="12" fill="#0B1220" stroke="#86EFAC" stroke-opacity="0.28"/><text x="1095" y="768" text-anchor="middle" class="small" font-size="14">timeline</text><rect x="1215" y="737" width="190" height="50" rx="12" fill="#0B1220" stroke="#86EFAC" stroke-opacity="0.28"/><text x="1310" y="768" text-anchor="middle" class="small" font-size="14">search index</text></g><g transform="translate(300 842)"><rect width="1000" height="34" rx="17" fill="#050914" stroke="#1E293B"/><circle cx="62" cy="17" r="5" fill="#A78BFA"/><text x="76" y="22" class="micro" font-size="12">Input</text><circle cx="205" cy="17" r="5" fill="#60A5FA"/><text x="219" y="22" class="micro" font-size="12">Recall</text><circle cx="348" cy="17" r="5" fill="#22